<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Miejscownik – Twój osobisty katalog miejsc do odkrycia.">
  <meta name="theme-color" content="#12715E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Miejscownik">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Miejscownik</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body { background-color: #F7F5F1; }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 18px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: #12715E;
    }
    #loading .dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: #12715E; animation: pulse 1s infinite ease-in-out;
    }
    @keyframes pulse { 0%,100% { transform: scale(0.6); opacity: .4; } 50% { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>
  <div id="loading"><div class="dot"></div><div>Miejscownik</div></div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
